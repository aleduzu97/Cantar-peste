<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cântar">
<title>Calculator Cântărire</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  input, textarea { user-select: text; -webkit-user-select: text; }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    padding: 8px 14px;
    gap: 8px;
    border-bottom: 1px solid #1a1a1a;
  }
  .client-btn {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1c1c1e;
    border: none;
    border-radius: 10px;
    padding: 8px 12px;
    color: #fff;
    font-family: inherit;
    text-align: left;
    min-width: 0;
    cursor: pointer;
  }
  .cb-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .cb-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cb-name.empty { color: #666; font-weight: 400; font-style: italic; }
  .share-btn {
    flex: 0 0 auto;
    background: #30d158;
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .share-btn:disabled { background: #2a2a2a; color: #555; }

  .chips {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    padding: 8px 14px;
    background: #1c1c1e;
    border: 1px solid #2c2c2e;
    border-radius: 999px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .chip .p { color: #888; font-size: 12px; font-variant-numeric: tabular-nums; }
  .chip .np { color: #666; font-size: 11px; font-style: italic; }
  .chip.active { background: #0a84ff; border-color: #0a84ff; }
  .chip.active .p, .chip.active .np { color: #cce4ff; }
  .chip-add { background: transparent; border: 1px dashed #444; color: #888; font-size: 15px; padding: 8px 14px; }

  .display { flex: 0 0 auto; padding: 4px 24px 8px; }
  .display-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    min-height: 24px;
  }
  .sub {
    flex: 1 1 auto;
    font-size: 15px;
    color: #888;
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    text-align: right;
    min-width: 0;
  }
  .sub .art { color: #0a84ff; font-weight: 500; }
  .sub .calc { color: #30d158; }
  .sub .kg { color: #0a84ff; }
  .mode-toggle {
    flex: 0 0 auto;
    display: flex;
    background: #1c1c1e;
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
  }
  .mode-toggle .mt {
    background: transparent;
    border: none;
    color: #888;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    font-family: inherit;
    cursor: pointer;
  }
  .mode-toggle .mt.active { background: #0a84ff; color: white; }
  .main {
    font-size: 52px;
    font-weight: 300;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    white-space: nowrap;
    text-align: right;
  }
  .main .unit {
    font-size: 22px;
    color: #666;
    margin-left: 8px;
    font-weight: 400;
  }

  .items {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 0 24px;
    min-height: 30px;
  }
  .item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    color: #bbb;
    border-bottom: 1px solid #1a1a1a;
    font-variant-numeric: tabular-nums;
    gap: 8px;
  }
  .item .name { color: #fff; font-weight: 500; }
  .item .detail { color: #888; font-size: 12px; }
  .item .right { display: flex; align-items: center; gap: 10px; }
  .item .val { color: #30d158; }
  .item .val.wonly { color: #0a84ff; }
  .item .rm { color: #ff453a; padding: 0 4px; font-size: 16px; cursor: pointer; }

  .total-bar {
    flex: 0 0 auto;
    padding: 10px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #141414;
    font-variant-numeric: tabular-nums;
  }
  .total-bar .lbl { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .total-bar .val { font-size: 22px; font-weight: 500; color: #30d158; }

  .pad {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px 14px 14px;
  }
  button.key {
    border: none;
    border-radius: 999px;
    font-size: 28px;
    font-weight: 400;
    height: 66px;
    color: #fff;
    background: #333;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
  }
  button.key:active { filter: brightness(1.5); }
  .fn { background: #555; font-size: 20px; }
  .op { background: #ff9500; }
  .eq { background: #30d158; }
  .add { background: #0a84ff; font-size: 17px; }
  .clear { background: #ff453a; font-size: 20px; }
  .wide { grid-column: span 2; border-radius: 33px; text-align: left; padding-left: 30px; }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #1c1c1e;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 380px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
  }
  .modal h3 { font-size: 18px; font-weight: 500; margin-bottom: 14px; color: #fff; }
  .modal .hint { font-size: 12px; color: #888; margin: -8px 0 12px; }
  .modal input, .modal textarea {
    width: 100%;
    background: #2c2c2e;
    border: 1px solid #3c3c3e;
    border-radius: 10px;
    padding: 12px 14px;
    color: #fff;
    font-size: 17px;
    font-family: inherit;
    margin-bottom: 10px;
    outline: none;
    resize: none;
  }
  .modal textarea {
    min-height: 240px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    line-height: 1.4;
  }
  .modal input:focus { border-color: #0a84ff; }
  .modal-btns { display: flex; gap: 8px; margin-top: 8px; }
  .modal-btns button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: #fff;
    cursor: pointer;
  }
  .mb-cancel { background: #3a3a3c; }
  .mb-del { background: #ff453a; flex: 0 0 auto !important; padding: 12px 16px !important; }
  .mb-ok { background: #0a84ff; font-weight: 500; }
</style>
</head>
<body>
  <div class="topbar">
    <button class="client-btn" onclick="openClientModal()">
      <span class="cb-label">Client</span>
      <span class="cb-name" id="cbName">— nou —</span>
    </button>
    <button class="share-btn" id="shareBtn" onclick="exportClient()">↗ Export</button>
  </div>

  <div class="chips" id="chips"></div>

  <div class="display">
    <div class="display-top">
      <div class="mode-toggle">
        <button class="mt" data-mode="kg" onclick="setMode('kg')">kg</button>
        <button class="mt" data-mode="ron" onclick="setMode('ron')">RON</button>
      </div>
      <div class="sub" id="sub"></div>
    </div>
    <div class="main" id="main">0</div>
  </div>

  <div class="items" id="items"></div>

  <div class="total-bar" id="totalBar">
    <span class="lbl">Total client</span>
    <span class="val" id="total">0.00 RON</span>
  </div>

  <div class="pad">
    <button class="key fn clear" onclick="clearAll()">AC</button>
    <button class="key fn" onclick="backspace()">⌫</button>
    <button class="key fn" onclick="setTara()">Tara</button>
    <button class="key op" onclick="setOp('×')">×</button>

    <button class="key" onclick="digit('7')">7</button>
    <button class="key" onclick="digit('8')">8</button>
    <button class="key" onclick="digit('9')">9</button>
    <button class="key op" onclick="setOp('−')">−</button>

    <button class="key" onclick="digit('4')">4</button>
    <button class="key" onclick="digit('5')">5</button>
    <button class="key" onclick="digit('6')">6</button>
    <button class="key op" onclick="setOp('+')">+</button>

    <button class="key" onclick="digit('1')">1</button>
    <button class="key" onclick="digit('2')">2</button>
    <button class="key" onclick="digit('3')">3</button>
    <button class="key eq" onclick="equals()">=</button>

    <button class="key wide" onclick="digit('0')">0</button>
    <button class="key" onclick="digit('.')">,</button>
    <button class="key add" onclick="addItem()">Adaugă</button>
  </div>

  <!-- Modal articol -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3 id="mTitle">Articol nou</h3>
      <input type="text" id="mName" placeholder="Nume (ex. Fitofag)" autocomplete="off" autocapitalize="words">
      <input type="text" id="mPrice" placeholder="Preț per kg (opțional)" inputmode="decimal" autocomplete="off">
      <div class="hint">Cu preț salvat: în mod RON se calculează automat kg × preț. În mod kg logezi doar greutatea.</div>
      <div class="modal-btns">
        <button class="mb-cancel" onclick="closeModal()">Anulează</button>
        <button class="mb-del" id="mDel" onclick="deleteArticleModal()" style="display:none;">Șterge</button>
        <button class="mb-ok" onclick="saveArticleModal()">Salvează</button>
      </div>
    </div>
  </div>

  <!-- Modal client -->
  <div class="modal-bg" id="clientModal">
    <div class="modal">
      <h3>Nume client</h3>
      <input type="text" id="cInput" placeholder="Ex. Ion Popescu" autocomplete="off" autocapitalize="words">
      <div class="modal-btns">
        <button class="mb-cancel" onclick="closeClientModal()">Anulează</button>
        <button class="mb-del" id="cDel" onclick="clearClientName()">Șterge</button>
        <button class="mb-ok" onclick="saveClientName()">Salvează</button>
      </div>
    </div>
  </div>

  <!-- Modal reset -->
  <div class="modal-bg" id="resetModal">
    <div class="modal">
      <h3>Client nou?</h3>
      <div style="color:#888; font-size:14px; margin-bottom:8px;">Se șterg toate cântăririle și numele clientului. Articolele salvate (Fitofag etc.) rămân.</div>
      <div class="modal-btns">
        <button class="mb-cancel" onclick="closeResetModal()">Nu</button>
        <button class="mb-ok" style="background:#ff453a;" onclick="confirmReset()">Șterge tot</button>
      </div>
    </div>
  </div>

  <!-- Modal export -->
  <div class="modal-bg" id="exportModal">
    <div class="modal">
      <h3>Export cântărire</h3>
      <textarea id="exportText" readonly></textarea>
      <div class="modal-btns">
        <button class="mb-cancel" onclick="closeExportModal()">Închide</button>
        <button class="mb-ok" onclick="copyExport()">Copiază</button>
      </div>
    </div>
  </div>

<script>
  let current = '0', previous = null, op = null, justEvaluated = false;
  let hasMul = false;
  let items = JSON.parse(localStorage.getItem('items') || '[]');
  // Curăță etichetele generice "Articol N" din date vechi
  items.forEach(it => { if (it.label && /^Articol \d+$/.test(it.label)) it.label = null; });
  let articles = JSON.parse(localStorage.getItem('articles') || '[]');
  let clientName = localStorage.getItem('clientName') || '';
  let mode = localStorage.getItem('mode') || 'ron';
  let selectedIdx = null, editingIdx = null;

  const $ = id => document.getElementById(id);
  const $main = $('main'), $sub = $('sub'), $items = $('items'), $total = $('total'), $chips = $('chips');
  const $cbName = $('cbName'), $shareBtn = $('shareBtn');

  const fmt = n => Number(n).toLocaleString('ro-RO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtNum = s => {
    if (s === '' || s === '.') return '0';
    const [i, d] = s.split('.');
    const ii = Number(i || '0').toLocaleString('ro-RO');
    return d !== undefined ? ii + ',' + d : ii;
  };
  const fmtWeight = n => String(Math.round(n * 1000) / 1000).replace('.', ',');

  function save() {
    localStorage.setItem('items', JSON.stringify(items));
    localStorage.setItem('articles', JSON.stringify(articles));
    localStorage.setItem('clientName', clientName);
    localStorage.setItem('mode', mode);
  }

  // Ce reprezintă numărul curent?
  // - Dacă s-a folosit × → rezultatul e RON (kg × preț = bani)
  // - Mod kg → mereu kg (log greutate)
  // - Mod RON cu articol cu preț → kg (se va înmulți automat)
  // - Mod RON altfel → RON
  function currentUnit() {
    if (hasMul) return 'RON';
    if (mode === 'kg') return 'kg';
    const a = selectedIdx !== null ? articles[selectedIdx] : null;
    if (a && a.price) return 'kg';
    return 'RON';
  }

  function render() {
    // Main display
    const unit = currentUnit();
    const showUnit = current !== '0' || op !== null || justEvaluated;
    $main.innerHTML = fmtNum(current) + (showUnit ? ` <span class="unit">${unit}</span>` : '');

    // Mode toggle
    document.querySelectorAll('.mode-toggle .mt').forEach(el => {
      el.classList.toggle('active', el.dataset.mode === mode);
    });

    // Sub display
    const a = selectedIdx !== null ? articles[selectedIdx] : null;
    const num = parseFloat(current) || 0;

    if (op && previous !== null) {
      const label = a ? `<span class="art">${a.name}</span> · ` : '';
      $sub.innerHTML = `${label}${fmtNum(previous)} ${op}`;
    } else if (mode === 'kg') {
      if (a && num > 0) $sub.innerHTML = `<span class="art">${a.name}</span> · <span class="kg">${fmtWeight(num)} kg</span>`;
      else if (a) $sub.innerHTML = `<span class="art">${a.name}</span>`;
      else if (num > 0) $sub.innerHTML = `<span class="kg">${fmtWeight(num)} kg</span>`;
      else $sub.textContent = '';
    } else {
      // Mod RON
      if (a && a.price && num > 0 && !hasMul) {
        const t = Math.round(num * a.price * 100) / 100;
        $sub.innerHTML = `<span class="art">${a.name}</span> ${fmtWeight(num)}kg × ${a.price} = <span class="calc">${fmt(t)} RON</span>`;
      } else if (a && a.price) {
        $sub.innerHTML = `<span class="art">${a.name}</span> · ${a.price} RON/kg`;
      } else if (a) {
        $sub.innerHTML = `<span class="art">${a.name}</span> · fără preț fix`;
      } else {
        $sub.textContent = '';
      }
    }

    // Chips
    $chips.innerHTML = articles.map((art, i) =>
      `<button class="chip ${selectedIdx === i ? 'active' : ''}" data-idx="${i}">
        ${art.name}${art.price ? ` <span class="p">${art.price}</span>` : ` <span class="np">fără preț</span>`}
      </button>`
    ).join('') + `<button class="chip chip-add" id="chipAdd">+ articol</button>`;

    $chips.querySelectorAll('.chip[data-idx]').forEach(el => {
      const idx = +el.dataset.idx;
      let t, moved = false, longFired = false;
      el.addEventListener('touchstart', () => {
        moved = false; longFired = false;
        t = setTimeout(() => { longFired = true; openEditModal(idx); }, 550);
      }, { passive: true });
      el.addEventListener('touchmove', () => { moved = true; clearTimeout(t); });
      el.addEventListener('touchend', () => {
        clearTimeout(t);
        if (!moved && !longFired) selectArticle(idx);
      });
    });
    $('chipAdd').addEventListener('click', openAddModal);

    // Items list
    $items.innerHTML = items.map((it, i) => {
      let detail = '', valDisplay;
      const nameSpan = it.label ? `<span class="name">${it.label}</span>` : '';
      if (it.weight != null && it.pricePerKg) {
        detail = `<div class="detail">${fmtWeight(it.weight)}kg × ${it.pricePerKg}</div>`;
        valDisplay = `<span class="val">${fmt(it.value)} RON</span>`;
      } else if (it.weight != null) {
        detail = `<div class="detail">doar cântărit</div>`;
        valDisplay = `<span class="val wonly">${fmtWeight(it.weight)} kg</span>`;
      } else {
        valDisplay = `<span class="val">${fmt(it.value)} RON</span>`;
      }
      return `<div class="item">
        <div>${nameSpan}${detail}</div>
        <div class="right">${valDisplay}<span class="rm" onclick="removeItem(${i})">✕</span></div>
      </div>`;
    }).join('');

    const sum = items.reduce((s, b) => s + (b.value || 0), 0);
    $total.textContent = fmt(sum) + ' RON';

    if (clientName) { $cbName.textContent = clientName; $cbName.classList.remove('empty'); }
    else { $cbName.textContent = '— nou —'; $cbName.classList.add('empty'); }

    $shareBtn.disabled = items.length === 0;
    save();
  }

  function setMode(m) { mode = m; render(); }

  function digit(d) {
    if (justEvaluated) { current = '0'; justEvaluated = false; hasMul = false; }
    if (d === '.') { if (!current.includes('.')) current += '.'; }
    else {
      if (current === '0') current = d;
      else if (current.length < 12) current += d;
    }
    render();
  }
  function backspace() {
    if (justEvaluated) { clearAll(); return; }
    current = current.slice(0, -1) || '0';
    render();
  }
  function clearAll() {
    current = '0'; previous = null; op = null; justEvaluated = false; hasMul = false;
    render();
  }
  function setOp(o) {
    if (op && previous !== null && !justEvaluated) equals();
    previous = current; current = '0'; op = o; justEvaluated = false;
    if (o === '×') hasMul = true;
    render();
  }
  function equals() {
    if (previous === null || op === null) return;
    const a = parseFloat(previous), b = parseFloat(current);
    let r = 0;
    if (op === '×') r = a * b;
    if (op === '+') r = a + b;
    if (op === '−') r = a - b;
    current = String(Math.round(r * 100) / 100);
    previous = null; op = null; justEvaluated = true;
    render();
  }
  function setTara() {
    previous = current; current = '0'; op = '−'; justEvaluated = false;
    render();
  }

  function selectArticle(i) { selectedIdx = (selectedIdx === i) ? null : i; render(); }

  function openAddModal() {
    editingIdx = null;
    $('mTitle').textContent = 'Articol nou';
    $('mName').value = ''; $('mPrice').value = '';
    $('mDel').style.display = 'none';
    $('modal').classList.add('show');
    setTimeout(() => $('mName').focus(), 50);
  }
  function openEditModal(i) {
    editingIdx = i;
    const a = articles[i];
    $('mTitle').textContent = 'Editează articol';
    $('mName').value = a.name;
    $('mPrice').value = a.price || '';
    $('mDel').style.display = 'block';
    $('modal').classList.add('show');
  }
  function closeModal() { $('modal').classList.remove('show'); }
  function saveArticleModal() {
    const name = $('mName').value.trim();
    if (!name) return;
    const priceStr = $('mPrice').value.replace(',', '.').trim();
    let price = null;
    if (priceStr) {
      const p = parseFloat(priceStr);
      if (p && p > 0) price = Math.round(p * 100) / 100;
    }
    const clean = { name, price };
    if (editingIdx !== null) articles[editingIdx] = clean;
    else articles.push(clean);
    closeModal(); save(); render();
  }
  function deleteArticleModal() {
    if (editingIdx === null) return;
    articles.splice(editingIdx, 1);
    if (selectedIdx === editingIdx) selectedIdx = null;
    else if (selectedIdx !== null && selectedIdx > editingIdx) selectedIdx--;
    closeModal(); save(); render();
  }

  function openClientModal() {
    $('cInput').value = clientName;
    $('cDel').style.display = clientName ? 'block' : 'none';
    $('clientModal').classList.add('show');
    setTimeout(() => $('cInput').focus(), 50);
  }
  function closeClientModal() { $('clientModal').classList.remove('show'); }
  function saveClientName() { clientName = $('cInput').value.trim(); closeClientModal(); save(); render(); }
  function clearClientName() { clientName = ''; closeClientModal(); save(); render(); }

  function addItem() {
    const a = selectedIdx !== null ? articles[selectedIdx] : null;

    if (op && previous !== null) equals();
    const num = parseFloat(current);
    if (!num || num <= 0) return;

    let label = a ? a.name : null;
    let value = 0, weight = null, pricePerKg = null;

    if (mode === 'ron' && a && a.price && !hasMul) {
      // Auto-multiply: articol cu preț salvat, mod RON, fără × manual → kg × preț
      weight = num;
      pricePerKg = a.price;
      value = Math.round(num * a.price * 100) / 100;
    } else if (mode === 'kg' && !hasMul) {
      // Mod kg pur: log greutate, fără preț
      weight = num;
      value = 0;
    } else {
      // Mod RON fără preț salvat, SAU rezultat de × manual → sumă RON directă
      value = Math.round(num * 100) / 100;
    }

    items.push({ label, value, weight, pricePerKg });
    current = '0'; previous = null; op = null; justEvaluated = false; hasMul = false;
    render();
  }

  function removeItem(i) { items.splice(i, 1); render(); }

  let pt;
  const $tb = $('totalBar');
  $tb.addEventListener('touchstart', () => { pt = setTimeout(() => $('resetModal').classList.add('show'), 700); }, { passive: true });
  $tb.addEventListener('touchend', () => clearTimeout(pt));
  $tb.addEventListener('touchmove', () => clearTimeout(pt));
  function closeResetModal() { $('resetModal').classList.remove('show'); }
  function confirmReset() { items = []; clientName = ''; closeResetModal(); render(); }

  function buildExportText() {
    const now = new Date();
    const dd = String(now.getDate()).padStart(2, '0');
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const yy = now.getFullYear();
    const hh = String(now.getHours()).padStart(2, '0');
    const mi = String(now.getMinutes()).padStart(2, '0');

    let out = '🐟 Cântăriri';
    if (clientName) out += ` — ${clientName}`;
    out += `\n📅 ${dd}.${mm}.${yy}  ${hh}:${mi}\n\n`;

    items.forEach(it => {
      let line = '• ';
      if (it.label) line += `${it.label} — `;
      if (it.weight != null && it.pricePerKg) line += `${fmtWeight(it.weight)}kg × ${it.pricePerKg} RON/kg = ${fmt(it.value)} RON`;
      else if (it.weight != null) line += `${fmtWeight(it.weight)} kg`;
      else line += `${fmt(it.value)} RON`;
      out += line + '\n';
    });

    const sum = items.reduce((s, b) => s + (b.value || 0), 0);
    const totalKg = items.reduce((s, b) => s + (b.weight || 0), 0);
    out += `\nTotal: ${fmt(sum)} RON`;
    if (totalKg > 0) out += `\nTotal cântărit: ${fmtWeight(totalKg)} kg`;
    return out;
  }

  async function exportClient() {
    if (items.length === 0) return;
    const text = buildExportText();
    if (navigator.share) {
      try { await navigator.share({ title: 'Cântăriri', text }); return; }
      catch (e) { if (e.name === 'AbortError') return; }
    }
    $('exportText').value = text;
    $('exportModal').classList.add('show');
  }
  function closeExportModal() { $('exportModal').classList.remove('show'); }
  async function copyExport() {
    const text = $('exportText').value;
    try {
      await navigator.clipboard.writeText(text);
      const btn = event.target;
      const old = btn.textContent;
      btn.textContent = '✓ Copiat';
      setTimeout(() => btn.textContent = old, 1500);
    } catch (e) { $('exportText').select(); }
  }

  ['modal', 'clientModal', 'resetModal', 'exportModal'].forEach(id => {
    const el = $(id);
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
  });

  render();
</script>
</body>
</html>
